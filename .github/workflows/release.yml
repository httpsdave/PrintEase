name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore and Build
        run: |
          dotnet restore .\PrintEase.sln
          dotnet build .\PrintEase.sln --configuration Release --no-restore

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: .\scripts\build-installer.ps1 -Runtime win-x64 -Configuration Release

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/Output/PrintEase-Setup.exe
            PrintEase.App/bin/Release/net8.0-windows/win-x64/publish/PrintEase.App.exe
          generate_release_notes: true
