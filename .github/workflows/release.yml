name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore and Build
        run: |
          dotnet restore .\PrintEase.sln
          dotnet build .\PrintEase.sln --configuration Release --no-restore

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: .\scripts\build-installer.ps1 -Runtime win-x64 -Configuration Release

      - name: Decode signing certificate
        if: ${{ secrets.SIGN_CERT_BASE64 != '' && secrets.SIGN_CERT_PASSWORD != '' }}
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String("${{ secrets.SIGN_CERT_BASE64 }}"))
          "SIGN_CERT_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Sign binaries
        if: ${{ env.SIGN_CERT_PATH != '' }}
        shell: pwsh
        run: |
          $signtool = "C:\Program Files (x86)\Windows Kits\10\bin\x64\signtool.exe"
          if (-not (Test-Path $signtool)) {
            $signtool = "C:\Program Files\Windows Kits\10\bin\x64\signtool.exe"
          }

          if (Test-Path $signtool) {
            & $signtool sign /f "$env:SIGN_CERT_PATH" /p "${{ secrets.SIGN_CERT_PASSWORD }}" /fd SHA256 /tr "http://timestamp.digicert.com" /td SHA256 .\installer\Output\PrintEase-Setup.exe
          } else {
            Write-Host "signtool not found; skipping signing."
          }

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/Output/PrintEase-Setup.exe
            PrintEase.App/bin/Release/net8.0-windows/win-x64/publish/PrintEase.App.exe
          generate_release_notes: true
